<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concordia GPE Internal Database</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f9f9f9; color: #333; }
        .main-layout { display: grid; grid-template-columns: 1fr 2.5fr; gap: 20px; max-width: 1400px; margin: 0 auto; }
        .container-box { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1, h2 { color: #2c3e50; margin-top: 0; font-size: 1.2em; }
        .section-box { padding: 15px; background: #ecf0f1; border-radius: 5px; margin-bottom: 15px; border-left: 4px solid #3498db; }
        input[type="text"], input[type="url"], textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { padding: 10px 15px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%; transition: background-color 0.2s ease; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        .doaj-station { border-left-color: #f39c12; background: #fff9f0; }
        .btn-zapier { background-color: #8e44ad; margin-top: 8px; }
        .journal-item { background: #fff; border: 1px solid #e0e0e0; margin-bottom: 15px; padding: 15px; border-radius: 5px; border-left: 5px solid #e74c3c; }
        .journal-title { font-weight: bold; font-size: 1.1em; }
        .verify-controls { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .btn-v { font-size: 0.75em; padding: 4px 10px; width: auto; }
        .btn-doaj { background-color: #f39c12; }
        .btn-gemini-v { background-color: #8e44ad; }
        .doaj-status-badge { display: block; margin-top: 8px; font-size: 0.8em; padding: 4px 8px; border-radius: 4px; }
        .status-verified { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-notfound { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .version-info { position: fixed; bottom: 10px; right: 10px; font-size: 0.9em; color: #7f8c8d; background: rgba(255, 255, 255, 0.8); padding: 5px; }
        .total-badge { font-size: 0.6em; background: #34495e; color: white; padding: 2px 8px; border-radius: 12px; margin-left: 10px; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="left-col">
        <div class="container-box">
            <h1>GPE Journal Tools</h1>
            
            <div class="section-box doaj-station">
                <h2>1. Journal Vetting</h2>
                <input type="text" id="doajQuery" placeholder="Verify Title or ISSN...">
                <button onclick="searchDOAJ()" style="margin-bottom: 8px;">Verify DOAJ API</button>
                
                <div style="border-top: 1px solid #ddd; padding-top: 10px;">
                    <button class="btn-zapier" id="zapierBtnLeft" onclick="classifyJournal(document.getElementById('doajQuery').value, 'zapierBtnLeft')">Gemini Analysis</button>
                    <p style="font-size: 0.8em; color: #666; margin-top: 10px; font-style: italic; line-height: 1.4;">
                        When using the Gemini Analysis option, after Gemini opens, simply click paste and the journal information will automatically be transferred.
                    </p>
                </div>
            </div>

            <div class="section-box">
                <h2>2. Internal Database</h2>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="searchInput" onkeyup="searchJournals()" placeholder="Search GPE records...">
                    <button style="background:#95a5a6; width:auto;" onclick="clearSearch()">X</button>
                </div>
            </div>

            <div class="section-box">
                <h2>3. Add New Entry</h2>
                <input type="text" id="newJournalName" placeholder="Journal Name">
                <input type="url" id="newJournalLink" placeholder="Homepage URL">
                <textarea id="newJournalRationale" rows="3" placeholder="Rationale for entry..."></textarea>
                <button id="addBtn" onclick="addJournal()">Save to G-Sheet</button>
            </div>
            
            <button style="background:#2ecc71;" onclick="exportToCSV()">Export All to CSV</button>
        </div>
    </div>

    <div class="right-col">
        <h2>Database Status <span id="totalCount" class="total-badge">0</span></h2>
        <div id="loadingMessage" style="font-style: italic; color: #7f8c8d;">Connecting to database...</div>
        <ul id="journalList" style="list-style:none; padding:0;"></ul>
    </div>
</div>

<div class="version-info">
    <time datetime="2026-04-16">Updated Apr 16, 2026 Ver 5.7</time>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxs1367Mh_Qj37vXbkYdifnaIGL2MdOBgqhP9XNu4HjnKMV3mle1OfU_A7eyOuRZUbusg/exec";
    let journals = [];

    async function classifyJournal(journalName, btnId) {
        if (!journalName || !journalName.trim()) { alert("Please enter a journal name first."); return; }
        
        const promptText = `Please check online resources for information on the journal "${journalName}". Advise if it is listed anywhere as a second-tier, predatory, or questionable journal. Look for mentions in Beall's List (or its successors), Cabells, or academic forums discussing deceptive publishing practices.`;

        try {
            await navigator.clipboard.writeText(promptText);
        } catch (err) {
            const textArea = document.createElement("textarea");
            textArea.value = promptText;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand("copy");
            document.body.removeChild(textArea);
        }

        const geminiUrl = `https://gemini.google.com/app?q=${encodeURIComponent(promptText)}`;
        window.open(geminiUrl, '_blank');

        fetch('https://hooks.zapier.com/hooks/catch/27249740/uj6xzh2/', {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ journal_name: journalName })
        }).catch(error => console.error('Zapier Error:', error));
    }

    async function searchDOAJ() {
        const query = document.getElementById('doajQuery').value.trim();
        if(!query) return;
        try {
            const resp = await fetch(`https://doaj.org/api/v2/search/journals/title:${encodeURIComponent(query)}`);
            const data = await resp.json();
            alert(data.total > 0 ? "✓ Found in DOAJ: " + data.results[0].bibjson.title : "✗ Not found in DOAJ.");
        } catch (e) { alert("DOAJ API Error."); }
    }

    async function checkDOAJRight(journalTitle, statusId) {
        const statusEl = document.getElementById(statusId);
        statusEl.innerHTML = "Checking...";
        statusEl.className = "doaj-status-badge";
        try {
            const query = encodeURIComponent(journalTitle);
            const response = await fetch(`https://doaj.org/api/v2/search/journals/title:${query}`);
            const data = await response.json();
            if (data.total > 0) {
                statusEl.innerHTML = `✓ Verified in DOAJ`;
                statusEl.classList.add('status-verified');
            } else {
                statusEl.innerHTML = `✗ Not Found in DOAJ`;
                statusEl.classList.add('status-notfound');
            }
        } catch (error) { statusEl.innerHTML = "Error."; }
    }

    async function fetchFromSheet() {
        try {
            const response = await fetch(WEB_APP_URL, { redirect: 'follow' });
            const sheetData = await response.json();
            journals = sheetData.reverse();
            document.getElementById('loadingMessage').textContent = "Database Synced.";
            updateTotalCount();
        } catch (e) { document.getElementById('loadingMessage').textContent = "Offline Mode."; }
    }

    async function addJournal() {
        const name = document.getElementById('newJournalName');
        const link = document.getElementById('newJournalLink');
        const rat = document.getElementById('newJournalRationale');
        if (!name.value || !rat.value) return alert("Required fields missing.");
        const entry = { title: name.value.trim(), link: link.value.trim(), rationale: rat.value.trim() };
        journals.unshift(entry);
        try {
            await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(entry) });
            alert("Record Saved to Google Sheet!");
            name.value = ''; link.value = ''; rat.value = '';
        } catch (e) { alert("Local update complete."); }
        updateTotalCount();
        searchJournals();
    }

    function searchJournals() {
        const q = document.getElementById('searchInput').value.toLowerCase().trim();
        const list = document.getElementById('journalList');
        list.innerHTML = q === "" ? '<li style="text-align:center; color:#999; margin-top:50px;">Search database records...</li>' : "";
        if (q === "") return;
        journals.filter(j => j.title.toLowerCase().includes(q)).forEach((j, idx) => {
            const li = document.createElement('li');
            li.className = 'journal-item';
            const sId = `st-${idx}`;
            const gBtnId = `gem-btn-${idx}`;
            li.innerHTML = `
                <div class="journal-title">${j.title}</div>
                <div class="journal-rationale"><b>Rationale:</b> ${j.rationale}</div>
                <div class="verify-controls">
                    <button class="btn-v btn-doaj" onclick="checkDOAJRight('${j.title.replace(/'/g, "\\'")}', '${sId}')">Verify DOAJ</button>
                    <button class="btn-v" onclick="window.open('https://www.scopus.com/sources.uri?st1=${encodeURIComponent(j.title)}', '_blank')">Scopus</button>
                    <button class="btn-v" onclick="window.open('https://publicationethics.org/members?search_api_views_fulltext=${encodeURIComponent(j.title)}', '_blank')">COPE</button>
                    <button class="btn-v btn-gemini-v" id="${gBtnId}" onclick="classifyJournal('${j.title.replace(/'/g, "\\'")}', '${gBtnId}')">Gemini AI Review</button>
                </div>
                <div id="${sId}"></div>
            `;
            list.appendChild(li);
        });
    }

    function clearSearch() { document.getElementById('searchInput').value = ""; searchJournals(); }
    function updateTotalCount() { document.getElementById('totalCount').textContent = journals.length; }
    function exportToCSV() {
        let csv = "data:text/csv;charset=utf-8,Title,Link,Rationale\n";
        journals.forEach(j => csv += `"${j.title}","${j.link}","${j.rationale}"\n`);
        const l = document.createElement("a"); l.href = encodeURI(csv); l.download = "gpe_database.csv"; l.click();
    }
    fetchFromSheet();
</script>
</body>
</html>
